name: vext
description: "VEXT VigilantMesh — Campus BLE Mesh Intelligence Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Navigation ────────────────────────────────────────────────────────────────
  go_router: ^14.6.1

  # ── State Management ──────────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Firebase ──────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # ── BLE ───────────────────────────────────────────────────────────────────────
  flutter_blue_plus: ^1.32.12

  # ── Serialization (Protobuf-compatible binary packets) ────────────────────────
  protobuf: ^3.1.0

  # ── Local Database (offline-first) ────────────────────────────────────────────
  # Drift (formerly Moor) — SQLite-based, type-safe, code-generated.
  # Replaces Isar 3.x which is incompatible with AGP 8.0+ (missing namespace
  # declaration in isar_flutter_libs android/build.gradle — unfixed since 2023).
  drift: ^2.20.0
  # sqlite3_flutter_libs bundles the SQLite native binary.
  # Maintained by the Drift author — has explicit AGP 8.x namespace support.
  sqlite3_flutter_libs: ^0.5.0
  # path: string path joining for the database file location.
  path: ^1.9.0
  path_provider: ^2.1.4

  # ── Cryptography ──────────────────────────────────────────────────────────────
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2

  # ── Runtime Permission Requests ──────────────────────────────────────────────
  # Used by BleTransportLayer to request BLUETOOTH_ADVERTISE at runtime before
  # starting the Kotlin BleAdvertiser. flutter_blue_plus handles BLUETOOTH_SCAN
  # and BLUETOOTH_CONNECT internally; BLUETOOTH_ADVERTISE must be requested here.
  permission_handler: ^11.3.1

  # ── GPS / Geofencing ──────────────────────────────────────────────────────────
  geolocator: ^13.0.2

  # ── Background Service (Android Foreground Service) ───────────────────────────
  flutter_background_service: ^5.0.8

  # ── Network Detection ─────────────────────────────────────────────────────────
  connectivity_plus: ^6.1.0

  # ── Utilities ─────────────────────────────────────────────────────────────────
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # ── Code Generation (Drift DB models + Mockito) ──────────────────────────────
  build_runner: ^2.4.13
  drift_dev: ^2.20.0

  # ── Testing ───────────────────────────────────────────────────────────────────
  mockito: ^5.4.4

flutter:
  uses-material-design: true
